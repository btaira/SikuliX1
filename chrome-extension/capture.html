<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Capture Region</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; cursor: crosshair; user-select: none; }
  #canvas { display: block; }

  #hint {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.75); color: #fff; font: 13px/1 system-ui;
    padding: 8px 16px; border-radius: 20px; pointer-events: none;
    border: 1px solid rgba(255,255,255,.2);
  }
  #selection {
    position: fixed; border: 2px solid #7c6af7; background: rgba(124,106,247,.12);
    pointer-events: none; display: none;
  }
  #coords {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.75); color: #4ec9b0; font: 11px/1 monospace;
    padding: 6px 12px; border-radius: 12px; pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hint">Drag to select a region — press Esc to cancel</div>
<div id="selection"></div>
<div id="coords"></div>
<script src="capture.js"></script>
</body>
</html>
