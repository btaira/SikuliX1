<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SikuliX for Chrome</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1e1e2e; --surface: #2a2a3e; --border: #3a3a5c;
    --accent: #7c6af7; --accent2: #4ec9b0; --danger: #f38ba8;
    --text: #cdd6f4; --muted: #6c7086; --success: #a6e3a1;
    --warn: #f9e2af;
  }

  body { background: var(--bg); color: var(--text); font: 13px/1.5 'Segoe UI', system-ui, sans-serif;
         display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* ── toolbar ── */
  #toolbar { display: flex; align-items: center; gap: 6px; padding: 8px; background: var(--surface);
             border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #toolbar h1 { font-size: 13px; font-weight: 700; color: var(--accent); flex: 1; }
  button { cursor: pointer; border: none; border-radius: 4px; font: inherit; padding: 4px 10px;
           transition: opacity .15s; }
  button:hover { opacity: .85; }
  button:active { opacity: .7; }
  #btn-run    { background: var(--accent);  color: #fff; }
  #btn-stop   { background: var(--danger);  color: #fff; display: none; }
  #btn-save   { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  #btn-clear  { background: var(--surface); color: var(--muted); border: 1px solid var(--border); font-size: 11px; }

  /* ── tabs ── */
  #tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { padding: 6px 14px; cursor: pointer; font-size: 12px; color: var(--muted); border-bottom: 2px solid transparent;
         user-select: none; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── panels ── */
  #editor-panel { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  #templates-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; padding: 8px; gap: 8px; }
  #panel-active-editor   { display: flex; }
  #panel-active-templates { display: none; }

  /* ── editor ── */
  #editor { flex: 1; background: var(--bg); color: var(--text); font: 13px/1.6 'Cascadia Code','Fira Mono',monospace;
            border: none; outline: none; resize: none; padding: 10px; tab-size: 2; }
  #editor::placeholder { color: var(--muted); }

  /* ── threshold bar ── */
  #threshold-bar { display: flex; align-items: center; gap: 8px; padding: 4px 8px; background: var(--surface);
                   border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); flex-shrink: 0; }
  #threshold-bar label { white-space: nowrap; }
  #threshold { width: 80px; accent-color: var(--accent); }
  #threshold-val { width: 28px; }

  /* ── console ── */
  #console-wrap { height: 130px; background: #0d0d1a; border-top: 1px solid var(--border); display: flex;
                  flex-direction: column; flex-shrink: 0; }
  #console-label { padding: 3px 8px; font-size: 10px; color: var(--muted); background: var(--surface);
                   border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  #console { flex: 1; overflow-y: auto; padding: 6px 8px; font: 11px/1.6 'Cascadia Code','Fira Mono',monospace; }
  .log-info  { color: var(--text); }
  .log-ok    { color: var(--success); }
  .log-warn  { color: var(--warn); }
  .log-error { color: var(--danger); }

  /* ── templates panel ── */
  #tpl-toolbar { display: flex; gap: 6px; flex-shrink: 0; }
  #tpl-name { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border);
              border-radius: 4px; padding: 4px 8px; font: inherit; outline: none; }
  #tpl-name::placeholder { color: var(--muted); }
  #btn-capture { background: var(--accent2); color: #000; }
  #tpl-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; }
  .tpl-item { display: flex; align-items: center; gap: 8px; padding: 6px; background: var(--surface);
              border: 1px solid var(--border); border-radius: 6px; }
  .tpl-thumb { width: 60px; height: 40px; object-fit: contain; background: #111; border-radius: 3px; }
  .tpl-name  { flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tpl-insert { font-size: 10px; padding: 2px 6px; background: var(--accent); color: #fff; }
  .tpl-delete { font-size: 10px; padding: 2px 6px; background: var(--danger); color: #fff; }

  /* ── scrollbar ── */
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="toolbar">
  <h1>⬡ SikuliX</h1>
  <button id="btn-save">Save</button>
  <button id="btn-run">▶ Run</button>
  <button id="btn-stop">■ Stop</button>
</div>

<div id="tabs">
  <div class="tab active" data-panel="editor">Script</div>
  <div class="tab"        data-panel="templates">Templates</div>
</div>

<!-- Script editor panel -->
<div id="editor-panel">
  <textarea id="editor" spellcheck="false" placeholder="// SikuliX automation script
// Available: find, exists, wait, waitVanish, findAll
//            click, rightClick, doubleClick, hover, dragDrop
//            type, key, scroll, pause, log, screenshot

// Example:
await click('search-box');
await type('Hello World');
await key('enter');
const result = await wait('result-item', 5000);
log('Found at: ' + result.x + ', ' + result.y);
"></textarea>

  <div id="threshold-bar">
    <label>Match threshold:</label>
    <input type="range" id="threshold" min="0.5" max="1.0" step="0.01" value="0.8">
    <span id="threshold-val">0.80</span>
    <span style="margin-left:auto; font-size:10px; color:var(--muted)">
      Templates: <span id="tpl-count">0</span>
    </span>
  </div>
</div>

<!-- Templates panel -->
<div id="templates-panel">
  <div id="tpl-toolbar">
    <input id="tpl-name" type="text" placeholder="template name…">
    <button id="btn-capture">📷 Capture</button>
  </div>
  <div id="tpl-list"></div>
</div>

<!-- Console -->
<div id="console-wrap">
  <div id="console-label">
    <span>Console</span>
    <button id="btn-clear" style="font-size:10px;padding:1px 6px;">Clear</button>
  </div>
  <div id="console"></div>
</div>

<script src="lib/api.js"></script>
<script src="sidepanel.js"></script>
</body>
</html>
